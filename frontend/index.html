<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seastar</title>
  <link rel="icon" href="../images/app_icon.ico" sizes="any"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="style.css"/>
  <style type="text/tailwindcss">
    @layer components {
      .btn-blue  { @apply px-4 py-1.5 text-[13px] font-semibold bg-[#007AFF] text-white rounded-full transition-all active:scale-95 active:opacity-75 disabled:opacity-30 disabled:cursor-not-allowed; }
      .btn-slate { @apply px-4 py-1.5 text-[13px] font-semibold bg-[#E5E5EA] text-black rounded-full transition-all active:scale-95 active:opacity-75 disabled:opacity-30; }
      .btn-ghost { @apply px-3 py-1.5 text-[13px] text-[#007AFF] font-medium rounded-full active:bg-[#007AFF]/10 transition-colors; }
      .input-base { @apply text-[13px] bg-black/5 border-none rounded-2xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#007AFF]/50 transition-all placeholder:text-[#8E8E93]; }
    }
  </style>
  <style>
    html, body {
      height: 100%; margin: 0; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body { display: flex; flex-direction: column; background: #F2F2F7; }

    .top-bar {
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 0.5px solid rgba(0,0,0,0.12);
    }

    .content-wrapper {
      flex: 1; position: relative; overflow: hidden; min-height: 0;
    }
    .tab-panel {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      overflow: hidden; background: #F2F2F7;
      transition: opacity 0.26s cubic-bezier(0.4,0,0.2,1),
                  transform 0.26s cubic-bezier(0.4,0,0.2,1);
    }
    .tab-panel.panel-hidden  { opacity: 0; pointer-events: none; transform: translateY(8px); }
    .tab-panel.panel-visible { opacity: 1; pointer-events: auto;  transform: translateY(0); }

    #queryGrid, #priceListGrid {
      flex: 1 1 0; min-height: 0; width: 100%;
      overflow: auto;
      background: #FFFFFF;
      border: none;
      border-radius: 0;
      box-shadow: none;
    }

    .sg-table {
      table-layout: fixed; border-collapse: collapse;
      font-size: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    }

    .sg-thead { position: sticky; top: 0; z-index: 10; }
    .sg-th {
      padding: 10px 16px; text-align: left;
      font-size: 13px; font-weight: 600; letter-spacing: 0.01em;
      white-space: nowrap; overflow: hidden;
      border-right: none;
      border-bottom: 0.5px solid rgba(0,0,0,0.12);
      background: rgba(242,242,247,0.95);
      color: #3C3C43CC;
      user-select: none; box-sizing: border-box;
      cursor: grab;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .sg-th:active { cursor: grabbing; }
    .sg-th-text { display: block; overflow: hidden; text-overflow: ellipsis; }

    .sg-th.col-fixed-hdr   { background: rgba(0,122,255,0.08); color: #007AFF; }
    .sg-th.col-price-hdr   { background: rgba(88,86,214,0.08); color: #5856D6; }
    .sg-th.col-company-hdr { background: rgba(52,199,89,0.08); color: #34C759; }

    .sg-th { transition: transform 0.18s cubic-bezier(0.4,0,0.2,1); }
    .sg-th-drag-source { opacity: 0.15 !important; }

    .sg-resize-handle {
      position: absolute; right: 0; top: 0; width: 5px; height: 100%;
      cursor: col-resize; background: transparent; z-index: 2;
    }
    .sg-resize-handle:hover { background: rgba(0,0,0,0.1); }

    .sg-td {
      padding: 12px 16px; font-size: 15px;
      border-right: none;
      border-bottom: 0.5px solid rgba(0,0,0,0.06);
      vertical-align: top; color: #000000; box-sizing: border-box;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }
    .sg-td.col-fixed-5  { background: rgba(0,122,255,0.05); }
    .sg-td.col-price    { background: rgba(88,86,214,0.05); }
    .sg-td.col-company  { background: rgba(52,199,89,0.05); }
    .sg-td.col-code     { font-family: 'Menlo','Consolas','SF Mono',monospace; font-size: 13px; color: #3C3C43; }
    .sg-td.col-wrap     { white-space: pre-wrap; word-break: break-word; text-overflow: clip; }

    .sg-spacer { background: transparent; border: none; }
    .sg-row    { cursor: pointer; transition: background 0.1s; }
    .sg-row-even .sg-td              { background-color: #FFFFFF; }
    .sg-row-even .sg-td.col-fixed-5  { background: rgba(0,122,255,0.05); }
    .sg-row-even .sg-td.col-price    { background: rgba(88,86,214,0.05); }
    .sg-row-even .sg-td.col-company  { background: rgba(52,199,89,0.05); }
    .sg-row-odd .sg-td               { background-color: #F9F9F9; }
    .sg-row-odd .sg-td.col-fixed-5   { background: rgba(0,122,255,0.07); }
    .sg-row-odd .sg-td.col-price     { background: rgba(88,86,214,0.07); }
    .sg-row-odd .sg-td.col-company   { background: rgba(52,199,89,0.07); }
    .sg-row:hover .sg-td         { background: rgba(0,122,255,0.06) !important; }
    .sg-row.row-selected .sg-td  { background: rgba(0,122,255,0.14) !important; color: #007AFF !important; }
    .sg-row.row-not-found .sg-td { color: #FF3B30 !important; background: rgba(255,59,48,0.05) !important; }
    .sg-row.row-matched .sg-td   { background: rgba(255,204,0,0.15) !important; }

    input[type=range].rh-slider {
      -webkit-appearance: none; width: 80px; height: 4px;
      border-radius: 2px; background: #cbd5e1; outline: none; cursor: pointer;
    }
    input[type=range].rh-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: #3b82f6; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }

    .kw-dropdown {
      position: absolute; top: calc(100% + 6px); right: 0; z-index: 50;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      padding: 14px;
      min-width: 320px; max-width: 480px;
    }
    .kw-chip {
      display: inline-flex; align-items: center; padding: 4px 12px;
      border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer;
      border: none; background: rgba(0,0,0,0.06); color: #3C3C43;
      transition: background .15s, color .15s; user-select: none;
    }
    .kw-chip:hover  { background: rgba(0,122,255,0.1); color: #007AFF; }
    .kw-chip.active { background: #007AFF; color: white; }

    @keyframes modal-in {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-overlay {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      background: rgba(15, 23, 42, 0);
      backdrop-filter: blur(0px) saturate(100%);
      -webkit-backdrop-filter: blur(0px) saturate(100%);
      transition: opacity 0.2s ease 0.12s, background 0.2s ease 0.12s,
                  backdrop-filter 0.2s ease 0.12s;
    }
    .modal-overlay--open {
      opacity: 1; pointer-events: auto;
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(7px) saturate(160%);
      -webkit-backdrop-filter: blur(7px) saturate(160%);
      transition: opacity 0.25s ease 0s, background 0.25s ease 0s,
                  backdrop-filter 0.25s ease 0s;
    }
    .modal-card {
      opacity: 0; transform: translateY(32px) scale(0.9);
      transition: opacity 0.18s ease 0s, transform 0.18s cubic-bezier(0.4,0,1,1) 0s;
    }
    .modal-overlay--open .modal-card {
      opacity: 1; transform: translateY(0) scale(1);
      transition: opacity 0.38s cubic-bezier(0.34,1.56,0.64,1) 0.08s,
                  transform 0.38s cubic-bezier(0.34,1.56,0.64,1) 0.08s;
    }

    .tab-btn {
      position: relative; padding: 8px 16px; font-size: 12px; color: #64748b;
      border-bottom: 2px solid transparent; cursor: pointer; transition: color .2s;
      background: none; border-top: none; border-left: none; border-right: none; outline: none;
    }
    .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; }
    .tab-btn:hover:not(.active) { color: #334155; }

    .toast-box {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      z-index: 9999;
      background: rgba(50,50,52,0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      color: #FFFFFF;
      padding: 12px 24px; border-radius: 99px;
      font-size: 15px; font-weight: 500; white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
      animation: modal-in 0.28s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    /* RFQ 粘贴链接按钮：绿色调 */
    .btn-rfq {
      padding: 6px 16px; font-size: 13px; font-weight: 600;
      background: linear-gradient(135deg, #34C759, #30B350);
      color: white; border-radius: 99px;
      transition: all .15s; cursor: pointer; border: none; outline: none;
    }
    .btn-rfq:active  { transform: scale(0.95); opacity: 0.8; }
    .btn-rfq:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Fix4: Finish 按钮 — 橙色 */
    .btn-finish {
      padding: 6px 18px; font-size: 13px; font-weight: 600;
      background: linear-gradient(135deg, #FF9500, #FF6B00);
      color: white; border-radius: 99px;
      transition: all .15s; cursor: pointer; border: none; outline: none;
    }
    .btn-finish:active   { transform: scale(0.95); opacity: 0.8; }
    .btn-finish:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Fix5: 上下翻页按钮 */
    .btn-nav {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 8px;
      font-size: 14px; font-weight: 600; line-height: 1;
      background: rgba(0,0,0,0.06); color: #3C3C43;
      border: none; cursor: pointer; transition: background .12s, transform .1s;
      user-select: none;
    }
    .btn-nav:hover:not(:disabled)  { background: rgba(0,122,255,0.12); color: #007AFF; }
    .btn-nav:active:not(:disabled) { transform: scale(0.9); }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── 向量检索 Toggle Switch ──────────────────────────────────── */
    .vector-toggle-wrap {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px 4px 8px;
      background: rgba(0,0,0,0.04);
      border-radius: 99px;
      border: 1px solid rgba(0,0,0,0.08);
      transition: background .2s, border-color .2s;
      user-select: none;
    }
    .vector-toggle-wrap.is-on {
      background: rgba(88,86,214,0.08);
      border-color: rgba(88,86,214,0.3);
    }
    .vector-toggle-wrap.is-busy {
      opacity: 0.6; cursor: not-allowed;
    }

    /* 小图标：向量/闪光 */
    .vector-icon {
      width: 16px; height: 16px; flex-shrink: 0;
      color: #8E8E93;
      transition: color .2s;
    }
    .vector-toggle-wrap.is-on .vector-icon { color: #5856D6; }

    .vector-label {
      font-size: 12px; font-weight: 600;
      color: #8E8E93;
      transition: color .2s;
      white-space: nowrap;
    }
    .vector-toggle-wrap.is-on .vector-label { color: #5856D6; }

    /* iOS 风格 Toggle */
    .toggle-track {
      position: relative; width: 36px; height: 20px;
      background: #D1D1D6; border-radius: 10px;
      transition: background .25s cubic-bezier(0.4,0,0.2,1);
      flex-shrink: 0; cursor: pointer;
    }
    .toggle-track.on { background: #5856D6; }
    .toggle-track.busy { cursor: not-allowed; }

    .toggle-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #FFFFFF;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      transition: transform .25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toggle-track.on .toggle-thumb { transform: translateX(16px); }

    /* 旋转动画（检索中）*/
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .vector-spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid rgba(88,86,214,0.25);
      border-top-color: #5856D6;
      animation: spin-slow 0.8s linear infinite;
      flex-shrink: 0;
    }
    /* ──────────────────────────────────────────────────────────── */
  </style>
</head>

<body x-data="App()" x-init="init()" @ocr-result.window="_handleOCRResult($event.detail)">

  <!-- ═══ TOP BAR ═══════════════════════════════════════ -->
  <div class="top-bar flex items-center gap-2 px-3 py-2 flex-shrink-0 h-12">
    <span class="text-sm font-bold text-slate-800 tracking-widest select-none mr-1">Seastar</span>
    <div class="w-px h-5 bg-slate-200 mx-1"></div>

    <label class="text-xs text-slate-400 font-medium whitespace-nowrap" x-text="t('company_label')"></label>
    <select x-model="company" @change="onCompanyChange()"
            class="text-xs border border-slate-200 rounded-md px-2 py-1 bg-white text-slate-700
                   focus:outline-none focus:ring-2 focus:ring-blue-400 w-36">
      <option value="">-- Select --</option>
      <template x-for="opt in companyOptions" :key="opt">
        <option :value="opt" x-text="opt"></option>
      </template>
    </select>

    <div class="w-px h-5 bg-slate-200 mx-1"></div>

    <!-- ── OCR 识别按钮（非 Seven Seas 时显示）── -->
    <button x-show="company !== 'Seven Seas'"
            @click="startOCR(false)" :disabled="isScanning" class="btn-blue">
      <span x-show="!isScanning" x-text="t('ocr_btn')"></span>
      <span x-show="isScanning" class="flex items-center gap-1">
        <svg class="animate-spin h-3 w-3" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.25"/>
          <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span x-text="t('scanning')"></span>
      </span>
    </button>

    <!-- ── 粘贴链接按钮（Seven Seas 时显示）── -->
    <button x-show="company === 'Seven Seas'"
            @click="openPasteLinkDialog()" :disabled="pasteLinkDlg.isParsing"
            class="btn-rfq">
      <span x-show="!pasteLinkDlg.isParsing" x-text="t('paste_link_btn')"></span>
      <span x-show="pasteLinkDlg.isParsing" class="flex items-center gap-1">
        <svg class="animate-spin h-3 w-3" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.25"/>
          <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span x-text="t('parsing')"></span>
      </span>
    </button>

    <!-- ── 向量检索 Toggle（仅 Seven Seas 显示）── -->
    <div x-show="company === 'Seven Seas'"
         @click="!isVectorQuerying && onVectorToggle()"
         :class="{
           'vector-toggle-wrap': true,
           'is-on':   vectorMode,
           'is-busy': isVectorQuerying,
         }"
         :title="vectorMode ? t('vector_off_title') : t('vector_mode_label')"
         style="cursor: pointer;">

      <!-- 检索中：旋转动画；空闲：闪光图标 -->
      <template x-if="isVectorQuerying">
        <div class="vector-spinner"></div>
      </template>
      <template x-if="!isVectorQuerying">
        <svg class="vector-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <!-- 向量/AI 图标（sparkle） -->
          <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/>
        </svg>
      </template>

      <span class="vector-label" x-text="isVectorQuerying ? t('vector_querying') : t('vector_mode_label')"></span>

      <!-- Toggle 滑块 -->
      <div :class="{ 'toggle-track': true, 'on': vectorMode, 'busy': isVectorQuerying }">
        <div class="toggle-thumb"></div>
      </div>
    </div>
    <!-- ───────────────────────────────────────────────── -->

    <!-- ── 追加识别（非 Seven Seas 时显示）── -->
    <button x-show="company !== 'Seven Seas'"
            @click="startOCR(true)" :disabled="isScanning" class="btn-slate"
            x-text="t('append_ocr')"></button>

    <button @click="queryPrices()" :disabled="isQuerying || !productItems.length" class="btn-blue">
      <span x-show="!isQuerying" x-text="t('query_price')"></span>
      <span x-show="isQuerying"  x-text="t('querying')"></span>
    </button>

    <!-- ── 复制表格（非 Seven Seas）/ Finish（Seven Seas）── -->
    <button x-show="company !== 'Seven Seas'"
            @click="openExportDialog()" :disabled="!queryResults.length"
            class="btn-slate"
            x-text="t('copy_table')"></button>

    <button x-show="company === 'Seven Seas'"
            @click="finishRFQ()"
            :disabled="!queryResults.length || !_rfqUrl"
            class="btn-finish"
            x-text="t('finish_btn')"></button>

    <button @click="clearAll()" class="btn-ghost text-red-400 hover:text-red-500 hover:bg-red-50" x-text="t('clear')"></button>

    <!-- 行高滑块 -->
    <div class="flex items-center gap-1.5 ml-3 pl-3 border-l border-slate-200">
      <span class="text-xs text-slate-400 whitespace-nowrap" x-text="t('row_height')"></span>
      <input type="range" class="rh-slider" min="28" max="200" step="4"
             :value="rowHeight" @input="onRowHeightChange($event.target.value)"/>
      <span class="text-xs text-slate-500 font-mono w-8" x-text="rowHeight + 'px'"></span>
    </div>

    <div class="flex-1"></div>

    <button @click="openDBUpdate()" class="btn-ghost text-slate-400 text-xs" x-text="t('fulllist_btn')"></button>
    <button @click="toggleLang()"
            class="text-xs font-semibold px-2 py-1 rounded border border-blue-300
                   text-blue-500 hover:bg-blue-50 ml-1"
            x-text="t('lang_toggle')"></button>
  </div>

  <!-- ═══ INFO BAR ══════════════════════════════════════ -->
  <div class="flex items-center px-3 py-1 bg-blue-50 border-b border-blue-100 flex-shrink-0 min-h-7">
    <span class="text-xs font-semibold text-blue-400 mr-2 flex-shrink-0" x-text="t('item_code_label')"></span>
    <span class="text-xs text-slate-600 truncate flex-1" x-text="codesText"></span>
    <span x-show="company" class="text-xs text-blue-500 font-medium ml-4 flex-shrink-0"
          x-text="t('price_col_prefix') + (companyColLabel || 'High / Medium Price')"></span>
    <!-- 向量模式状态标签 -->
    <span x-show="vectorMode"
          class="ml-3 flex-shrink-0 inline-flex items-center gap-1 px-2 py-0.5
                 bg-[#5856D6]/10 text-[#5856D6] text-[11px] font-semibold rounded-full">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/>
      </svg>
      <span x-text="t('vector_mode_label')"></span>
    </span>
  </div>

  <!-- ═══ TAB BAR ══════════════════════════════════════ -->
  <div class="flex items-end px-3 bg-white border-b border-slate-200 flex-shrink-0">
    <template x-for="tab in tabs" :key="tab.id">
      <button @click="switchTab(tab.id)"
              :class="{ 'active': activeTab === tab.id }"
              class="tab-btn">
        <span x-text="tab.label"></span>
      </button>
    </template>
  </div>

  <!-- ═══ CONTENT ═══════════════════════════════════════ -->
  <div class="content-wrapper">

    <!-- ── 价格查询面板 ─────────────────────────────── -->
    <div class="tab-panel" :class="activeTab === 'query' ? 'panel-visible' : 'panel-hidden'">

      <div class="flex items-center gap-x-3 gap-y-1 px-3 py-1.5 bg-white border-b border-slate-100
                  flex-shrink-0 overflow-x-auto flex-wrap">
        <span class="text-xs text-slate-400 flex-shrink-0" x-text="t('show_cols')"></span>
        <template x-for="col in infoColNames" :key="col">
          <label class="flex items-center gap-0.5 cursor-pointer flex-shrink-0 select-none">
            <input type="checkbox"
                   :checked="colVisibility[col]"
                   @change="toggleCol(col, $event.target.checked)"
                   class="h-3 w-3 accent-blue-500"/>
            <span class="text-xs text-slate-600 whitespace-nowrap" x-text="colLabel(col)"></span>
          </label>
        </template>
        <div class="flex-1"></div>
        <button @click="addBlankRow()"       class="btn-ghost text-xs py-0.5" x-text="t('add_row')"></button>
        <button @click="removeSelectedRow()" class="btn-ghost text-xs py-0.5" x-text="t('del_row')"></button>
      </div>

      <div id="queryGrid"></div>
    </div>

    <!-- ── 价目表面板 ──────────────────────────────── -->
    <div class="tab-panel" :class="activeTab === 'pricelist' ? 'panel-visible' : 'panel-hidden'">

      <div class="flex items-center gap-2 px-3 py-2 bg-white border-b border-slate-100 flex-shrink-0">
        <input type="text" x-model="priceSearch"
               @keydown.enter="onPriceSearch()"
               :placeholder="t('search_ph')"
               class="input-base flex-1 text-xs py-1"/>
        <button @click="onPriceSearch()"    class="btn-blue"       x-text="t('search_btn')"></button>
        <button @click="clearPriceSearch()" class="btn-ghost text-xs" x-text="t('clear_x')"></button>

        <!-- Fix5: 上下翻页按钮 -->
        <div class="flex items-center gap-1 ml-1" x-show="_priceMatchTotal > 1">
          <button @click="navigatePrev()"
                  :disabled="!_priceMatchTotal"
                  class="btn-nav"
                  title="上一个匹配">&#8593;</button>
          <button @click="navigateNext()"
                  :disabled="!_priceMatchTotal"
                  class="btn-nav"
                  title="下一个匹配">&#8595;</button>
        </div>

        <div class="w-px h-5 bg-slate-200"></div>

        <div class="relative" x-show="plKeywords.length > 0">
          <button @click="plKwOpen = !plKwOpen"
                  class="btn-slate flex items-center gap-1 whitespace-nowrap">
            <span x-text="t('keywords_btn')"></span>
            <span x-show="plKwSel.length > 0"
                  class="inline-flex items-center justify-center w-4 h-4 rounded-full
                         bg-blue-500 text-white text-[10px] font-bold"
                  x-text="plKwSel.length"></span>
            <svg class="w-3 h-3 ml-0.5 transition-transform duration-200"
                 :class="{ 'rotate-180': plKwOpen }"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

          <div x-show="plKwOpen"
               x-transition
               @click.outside="plKwOpen = false"
               class="kw-dropdown"
               style="display:none">
            <div class="flex items-center justify-between mb-2">
              <span class="text-xs font-semibold text-slate-500" x-text="t('kw_filter_title')"></span>
              <button @click="clearPlKw()"
                      class="text-xs text-red-400 hover:text-red-600 px-2 py-0.5
                             border border-red-200 rounded-md hover:bg-red-50 transition-colors"
                      x-text="t('clear_all')"></button>
            </div>
            <div class="grid grid-cols-4 gap-1.5">
              <template x-for="kw in plKeywords" :key="kw">
                <span @click="togglePlKw(kw)"
                      :class="{ 'active': isKwSelected(kw) }"
                      class="kw-chip justify-center text-center"
                      x-text="kw"></span>
              </template>
            </div>
            <div x-show="plKwSel.length > 0"
                 class="mt-2 pt-2 border-t border-slate-100 text-xs text-slate-400">
              <span x-text="t('kw_selected')"></span>
              <span class="text-blue-500 font-medium mx-1" x-text="plKwSel.length"></span>
              <span x-text="t('kw_sep')"></span>
              · <span x-text="plKwSel.join(' + ')"></span>
            </div>
          </div>
        </div>

        <span class="text-xs text-slate-400 ml-1 min-w-36 whitespace-nowrap" x-text="priceStats"></span>
      </div>

      <div id="priceListGrid"></div>
    </div>

  </div><!-- /content-wrapper -->


  <!-- ═══ EDIT MODAL ════════════════════════════════════ -->
  <div :class="editDlg.open ? 'modal-overlay modal-overlay--open' : 'modal-overlay'"
       @keydown.escape.window="editDlg.open = false"
       @click.self="editDlg.open = false">
    <div class="modal-card bg-white/90 backdrop-blur-2xl rounded-[38px] shadow-2xl w-[520px] p-8 border border-white/40"
         @click.stop>
      <h3 class="text-sm font-semibold text-slate-700 mb-4" x-text="t('edit_title')"></h3>
      <div class="space-y-3">
        <div class="flex items-center gap-3">
          <label class="text-xs text-slate-500 w-24 text-right" x-text="t('lbl_item_no')"></label>
          <input type="text" x-model="editDlg.item_no" class="input-base flex-1 text-xs"/>
        </div>
        <div class="flex items-center gap-3">
          <label class="text-xs text-slate-500 w-24 text-right" x-text="t('lbl_code')"></label>
          <input type="text" x-model="editDlg.code" class="input-base flex-1 text-xs"/>
        </div>
        <div class="flex items-start gap-3">
          <label class="text-xs text-slate-500 w-24 text-right mt-1.5" x-text="t('lbl_desc')"></label>
          <textarea x-model="editDlg.desc" rows="3"
                    class="input-base flex-1 text-xs resize-none"></textarea>
        </div>
        <div class="flex items-center gap-3">
          <label class="text-xs text-slate-500 w-24 text-right" x-text="t('lbl_qty')"></label>
          <input type="text" x-model="editDlg.qty"  class="input-base w-24 text-xs"/>
          <label class="text-xs text-slate-500 ml-2" x-text="t('lbl_uom')"></label>
          <input type="text" x-model="editDlg.unit" class="input-base w-20 text-xs"/>
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button @click="editDlg.open = false" class="btn-ghost text-xs" x-text="t('cancel')"></button>
        <button @click="saveEdit()"            class="btn-slate text-xs" x-text="t('save')"></button>
        <button @click="matchEdit()"           class="btn-blue  text-xs" x-text="t('match_btn')"></button>
      </div>
    </div>
  </div>

  <!-- ═══ EXPORT MODAL ══════════════════════════════════ -->
  <div :class="exportDlg.open ? 'modal-overlay modal-overlay--open' : 'modal-overlay'"
       @keydown.escape.window="exportDlg.open = false"
       @click.self="exportDlg.open = false">
    <div class="modal-card bg-white/90 backdrop-blur-2xl rounded-[38px] shadow-2xl w-80 p-8 border border-white/40"
         @click.stop>
      <h3 class="text-sm font-semibold text-slate-700 mb-5 text-center" x-text="t('export_title')"></h3>
      <div class="flex flex-col gap-3">
        <button @click="doExport('html')"
                class="w-full py-3.5 rounded-2xl bg-[#007AFF] text-white text-[15px] font-semibold active:opacity-75 transition-opacity">
          <span x-text="t('copy_html_btn')"></span><br>
          <span class="text-[12px] font-normal opacity-80" x-text="t('copy_html_sub')"></span>
        </button>
        <button @click="doExport('eml')"
                class="w-full py-3.5 rounded-2xl bg-[#34C759] text-white text-[15px] font-semibold active:opacity-75 transition-opacity">
          <span x-text="t('save_eml_btn')"></span><br>
          <span class="text-[12px] font-normal opacity-80" x-text="t('save_eml_sub')"></span>
        </button>
        <button @click="doExport('text')"
                class="w-full py-3 rounded-2xl bg-black/6 text-[#3C3C43] text-[15px] font-medium active:opacity-75 transition-opacity"
                x-text="t('copy_text_btn')"></button>
      </div>
      <button @click="exportDlg.open = false"
              class="w-full mt-3 text-xs text-slate-400 hover:text-slate-600"
              x-text="t('cancel')"></button>
    </div>
  </div>

  <!-- ═══ PASTE LINK MODAL（Seven Seas RFQ 询价）══════════ -->
  <div :class="pasteLinkDlg.open ? 'modal-overlay modal-overlay--open' : 'modal-overlay'"
       @keydown.escape.window="pasteLinkDlg.open = false"
       @click.self="pasteLinkDlg.open = false">
    <div class="modal-card bg-white/90 backdrop-blur-2xl rounded-[38px] shadow-2xl w-[540px] p-8 border border-white/40"
         @click.stop>

      <div class="flex items-start gap-3 mb-5">
        <div class="flex-shrink-0 w-10 h-10 rounded-2xl bg-[#34C759]/15 flex items-center justify-center">
          <svg class="w-5 h-5 text-[#34C759]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101
                     m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
          </svg>
        </div>
        <div>
          <h3 class="text-sm font-semibold text-slate-800" x-text="t('paste_link_title')"></h3>
          <p class="text-xs text-slate-400 mt-0.5" x-text="t('paste_link_sub')"></p>
        </div>
      </div>

      <textarea
        x-model="pasteLinkDlg.url"
        rows="4"
        :placeholder="t('paste_link_ph')"
        class="w-full rounded-2xl bg-black/5 border-none px-4 py-3 text-xs font-mono
               text-slate-700 resize-none focus:outline-none focus:ring-2 focus:ring-[#34C759]/50
               placeholder:text-[#8E8E93] transition-all"
        @keydown.meta.enter.prevent="submitPasteLink()"
        @keydown.ctrl.enter.prevent="submitPasteLink()"
      ></textarea>

      <p class="text-[11px] text-slate-400 mt-2 px-1">
        支持 http/https 链接或本地 .html 文件路径 · Ctrl+Enter 快速确认
      </p>

      <div class="flex justify-end gap-2 mt-5">
        <button @click="pasteLinkDlg.open = false"
                class="btn-ghost text-xs"
                x-text="t('cancel')"></button>
        <button @click="submitPasteLink()"
                :disabled="pasteLinkDlg.isParsing || !pasteLinkDlg.url.trim()"
                class="px-5 py-2 text-[13px] font-semibold rounded-full transition-all
                       active:scale-95 active:opacity-75 disabled:opacity-30 disabled:cursor-not-allowed
                       text-white"
                :class="pasteLinkDlg.isParsing
                          ? 'bg-slate-400'
                          : 'bg-[#34C759] hover:bg-[#30B350]'">
          <span x-show="!pasteLinkDlg.isParsing" class="flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
                       M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            <span x-text="t('confirm_btn')"></span>
          </span>
          <span x-show="pasteLinkDlg.isParsing" class="flex items-center gap-1.5">
            <svg class="animate-spin h-3.5 w-3.5" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.25"/>
              <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            </svg>
            <span x-text="t('parsing')"></span>
          </span>
        </button>
      </div>
    </div>
  </div>

  <!-- ═══ 向量检索关闭确认弹窗 ══════════════════════════ -->
  <div :class="vectorConfirmDlg.open ? 'modal-overlay modal-overlay--open' : 'modal-overlay'"
       @keydown.escape.window="vectorConfirmNo()"
       @click.self="vectorConfirmNo()">
    <div class="modal-card bg-white/90 backdrop-blur-2xl rounded-[38px] shadow-2xl w-[460px] p-8 border border-white/40"
         @click.stop>

      <!-- 标题区 -->
      <div class="flex items-start gap-3 mb-5">
        <div class="flex-shrink-0 w-10 h-10 rounded-2xl bg-[#5856D6]/10
                    flex items-center justify-center">
          <svg class="w-5 h-5 text-[#5856D6]" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/>
          </svg>
        </div>
        <div>
          <h3 class="text-sm font-semibold text-slate-800" x-text="t('vector_off_title')"></h3>
          <p class="text-xs text-slate-500 mt-1 leading-relaxed whitespace-pre-line"
             x-text="t('vector_off_msg')"></p>
        </div>
      </div>

      <!-- 操作按钮 -->
      <div class="flex flex-col gap-2 mt-2">
        <!-- 是：切回本地匹配 -->
        <button @click="vectorConfirmYes()"
                class="w-full py-3 rounded-2xl font-semibold text-[14px]
                       bg-slate-800 text-white active:opacity-75 transition-opacity"
                x-text="t('vector_off_yes')">
        </button>
        <!-- 否：保持向量结果 -->
        <button @click="vectorConfirmNo()"
                class="w-full py-3 rounded-2xl font-semibold text-[14px]
                       bg-[#5856D6]/10 text-[#5856D6] active:opacity-75 transition-opacity"
                x-text="t('vector_off_no')">
        </button>
      </div>
    </div>
  </div>

  <!-- ═══ TOAST ═════════════════════════════════════════ -->
  <div x-show="toast.show"
       x-transition
       class="toast-box"
       x-text="toast.msg"
       style="display:none">
  </div>

  <script src="js/grid.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
