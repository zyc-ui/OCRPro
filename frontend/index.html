<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UMIHOSHI</title>
  <link rel="icon" href="../images/app_icon.ico" sizes="any"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="style.css"/>
  <style type="text/tailwindcss">
    @layer components {
      /* 按钮增加点击缩放动画 (active:scale-95) 和更细腻的阴影 */
      .btn-blue  { @apply px-3 py-1.5 text-xs font-semibold bg-blue-500 text-white rounded-md shadow-sm hover:bg-blue-600 hover:shadow active:scale-95 transform transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100; }
      .btn-slate { @apply px-3 py-1.5 text-xs font-medium border border-slate-200 bg-white text-slate-700 rounded-md shadow-sm hover:bg-slate-50 hover:text-slate-900 active:scale-95 transform transition-all duration-200 disabled:opacity-40; }
      .btn-ghost { @apply px-3 py-1.5 text-xs font-medium text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-md active:scale-95 transform transition-all duration-200; }

      /* 输入框聚焦时增加柔和的光晕 */
      .input-base { @apply text-xs border border-slate-200 rounded-md px-3 py-1.5 bg-slate-50 hover:bg-white focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-400 transition-all duration-200; }
    }
  </style>
  <style>
    /* ══ 全局布局与字体 ══════════════════════════════════════════ */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      display: flex;
      flex-direction: column;
      background: #f1f5f9; /* 更现代的灰蓝背景 */
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    /* ══ 内容区（卡片化布局基准）══════════════ */
    .content-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
      padding: 12px 16px 16px 16px; /* 为表格留出悬浮呼吸感 */
    }

    /* ══ 各面板：过渡动画加入微缩放 (Scale) ════════ */
    .tab-panel {
      position: absolute;
      inset: 12px 16px 16px 16px; /* 匹配 content-wrapper 的 padding */
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: transparent;
      /* 贝塞尔曲线让弹性更自然 */
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tab-panel.panel-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px) scale(0.99); /* 隐藏时略微下沉缩小 */
    }
    .tab-panel.panel-visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    /* ══ 表格容器（带阴影的白底卡片） ══════════════════════════════════════════ */
    #queryGrid, #priceListGrid {
      flex: 1 1 0;
      min-height: 0;
      width: 100%;
      overflow: auto;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
    }

    /* ══ 表格核心样式 ══════════════════════════════════════ */
    .sg-table {
      table-layout: fixed;
      border-collapse: separate; /* 配合圆角与边框 */
      border-spacing: 0;
      font-size: 13px;
    }

    /* 表头：浅色系、深文字，高级感 */
    .sg-thead { position: sticky; top: 0; z-index: 10; }
    .sg-th {
      padding: 8px 12px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      border-right: 1px solid #f1f5f9;
      border-bottom: 2px solid #e2e8f0;
      background: #f8fafc;
      color: #475569;
      user-select: none;
      box-sizing: border-box;
      letter-spacing: 0.02em;
    }
    .sg-th-text { display: block; overflow: hidden; text-overflow: ellipsis; }

    /* 表头分类颜色淡化 */
    .sg-th.col-fixed-hdr    { background: #f0fdf4; color: #166534; border-bottom-color: #bbf7d0; }
    .sg-th.col-price-hdr    { background: #eff6ff; color: #1d4ed8; border-bottom-color: #bfdbfe; }
    .sg-th.col-company-hdr  { background: #f0fdf4; color: #15803d; border-bottom-color: #bbf7d0; }

    .sg-resize-handle {
      position: absolute; right: 0; top: 0;
      width: 6px; height: 100%;
      cursor: col-resize; background: transparent; z-index: 2;
    }
    .sg-resize-handle:hover { background: rgba(59, 130, 246, 0.2); } /* 蓝色拖拽条 */

    /* 数据单元格 */
    .sg-td {
      padding: 6px 12px;
      border-right: 1px solid #f1f5f9;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle; /* 居中对齐更好看 */
      color: #334155;
      box-sizing: border-box;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      transition: background-color 0.15s ease;
    }

    /* 弱化列底色，保持整体整洁 */
    .sg-td.col-fixed-5  { background: transparent; font-weight: 500;}
    .sg-td.col-price    { background: #fafafa; font-family: 'Consolas', monospace; font-size: 12px;}
    .sg-td.col-company  { background: transparent; }
    .sg-td.col-code     { font-family: 'Consolas','SF Mono',monospace; font-size: 12px; color: #64748b; }
    .sg-td.col-wrap     { white-space: pre-wrap; word-break: break-word; text-overflow: clip; line-height: 1.4; }

    /* 行状态：悬浮与选中 */
    .sg-spacer { background: transparent; border: none; }
    .sg-row    { cursor: pointer; }
    .sg-row-even .sg-td          { background-color: #ffffff; }
    .sg-row-odd .sg-td           { background-color: #fafbfc; } /* 极淡的斑马线 */

    .sg-row:hover .sg-td         { background: #f1f5f9 !important; color: #0f172a !important; }

    /* 选中行：淡蓝色底 + 左侧高亮指示条 */
    .sg-row.row-selected .sg-td  { background: #eff6ff !important; color: #1d4ed8 !important; }
    .sg-row.row-selected .sg-td:first-child { box-shadow: inset 3px 0 0 0 #3b82f6; }

    /* 状态颜色淡化，避免刺眼 */
    .sg-row.row-not-found .sg-td { color: #e11d48 !important; background: #fff1f2 !important; }
    .sg-row.row-matched .sg-td   { background: #fefce8 !important; }

    /* ══ 行高滑块美化 ══════════════════════════════════════════ */
    input[type=range].rh-slider {
      -webkit-appearance: none;
      width: 80px; height: 4px;
      border-radius: 2px;
      background: #e2e8f0;
      outline: none; cursor: pointer;
    }
    input[type=range].rh-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
      box-shadow: 0 0 0 2px #fff, 0 1px 3px rgba(0,0,0,.3);
      transition: transform 0.1s;
    }
    input[type=range].rh-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

    /* ══ 关键词下拉面板阴影优化 ════════════════════════════════════ */
    .kw-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 50;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(8px);
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,.1), 0 8px 10px -6px rgba(0,0,0,.05);
      padding: 12px;
      min-width: 320px;
      max-width: 480px;
    }

    .kw-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: #64748b;
      transition: all .2s ease;
      user-select: none;
    }
    .kw-chip:hover  { background: #f1f5f9; border-color: #cbd5e1; color: #334155; transform: translateY(-1px); }
    .kw-chip.active { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }

    /* ══ Tab 标签动效（增加底部横条平滑滑动感） ══════════════════════════════════════ */
    .tab-btn {
      position: relative;
      padding: 10px 16px;
      font-size: 13px;
      color: #64748b;
      cursor: pointer;
      background: none;
      border: none;
      outline: none;
      transition: color .2s ease;
      font-weight: 500;
    }
    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: #2563eb;
      transform: scaleX(0);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tab-btn.active { color: #1e293b; font-weight: 600; }
    .tab-btn.active::after { transform: scaleX(1); }
    .tab-btn:hover:not(.active) { color: #334155; }

    /* ══ 现代 Mac 风格滚动条 ══════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 6px;
      border: 3px solid transparent;
      background-clip: padding-box;
    }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; border: 2px solid transparent; background-clip: padding-box; }
  </style>
</head>

<body x-data="App()" x-init="init()" @ocr-result.window="_handleOCRResult($event.detail)">

  <!-- ═══ TOP BAR ═══════════════════════════════════════ -->
  <div class="flex items-center gap-2 px-3 py-2 bg-white border-b border-slate-200 flex-shrink-0 h-12 shadow-sm">
    <span class="text-sm font-bold text-slate-800 tracking-widest select-none mr-1">UMIHOSHI</span>
    <div class="w-px h-5 bg-slate-200 mx-1"></div>

    <label class="text-xs text-slate-400 font-medium whitespace-nowrap">公司</label>
    <select x-model="company" @change="onCompanyChange()"
            class="text-xs border border-slate-200 rounded-md px-2 py-1 bg-white text-slate-700
                   focus:outline-none focus:ring-2 focus:ring-blue-400 w-36">
      <option value="">-- 选择公司 --</option>
      <template x-for="opt in companyOptions" :key="opt">
        <option :value="opt" x-text="opt"></option>
      </template>
    </select>

    <div class="w-px h-5 bg-slate-200 mx-1"></div>

    <button @click="startOCR(false)" :disabled="isScanning" class="btn-blue">
      <span x-show="!isScanning">OCR识别</span>
      <span x-show="isScanning" class="flex items-center gap-1">
        <svg class="animate-spin h-3 w-3" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.25"/>
          <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>识别中
      </span>
    </button>

    <button @click="startOCR(true)"  :disabled="isScanning" class="btn-slate">追加识别</button>

    <button @click="queryPrices()"
            :disabled="isQuerying || !productItems.length"
            class="btn-blue">
      <span x-show="!isQuerying">查询价格</span>
      <span x-show="isQuerying">查询中…</span>
    </button>

    <button @click="openExportDialog()" :disabled="!queryResults.length" class="btn-slate">复制表格</button>
    <button @click="clearAll()" class="btn-ghost text-red-400 hover:text-red-500 hover:bg-red-50">清空</button>

    <!-- 行高滑块（全局，影响两张表）-->
    <div class="flex items-center gap-1.5 ml-3 pl-3 border-l border-slate-200">
      <span class="text-xs text-slate-400 whitespace-nowrap">行高</span>
      <input type="range" class="rh-slider"
             min="28" max="200" step="4"
             :value="rowHeight"
             @input="onRowHeightChange($event.target.value)"/>
      <span class="text-xs text-slate-500 font-mono w-8" x-text="rowHeight + 'px'"></span>
    </div>

    <div class="flex-1"></div>

    <button @click="openDBUpdate()" class="btn-ghost text-slate-400 text-xs">FullListUpdate</button>
    <button @click="toggleLang()"
            class="text-xs font-semibold px-2 py-1 rounded border border-blue-300
                   text-blue-500 hover:bg-blue-50 ml-1">
      <span x-text="lang === 'zh' ? 'EN' : '中'"></span>
    </button>
  </div>

  <!-- ═══ INFO BAR ══════════════════════════════════════ -->
  <div class="flex items-center px-3 py-1 bg-blue-50 border-b border-blue-100 flex-shrink-0 min-h-7">
    <span class="text-xs font-semibold text-blue-400 mr-2 flex-shrink-0">商品代码</span>
    <span class="text-xs text-slate-600 truncate flex-1" x-text="codesText"></span>
    <span x-show="company" class="text-xs text-blue-500 font-medium ml-4 flex-shrink-0"
          x-text="'价格列: ' + (companyColLabel || 'High / Medium Price')"></span>
  </div>

  <!-- ═══ TAB BAR ══════════════════════════════════════ -->
  <div class="flex items-end px-3 bg-white border-b border-slate-200 flex-shrink-0">
    <template x-for="tab in tabs" :key="tab.id">
      <button @click="switchTab(tab.id)"
              :class="{ 'active': activeTab === tab.id }"
              class="tab-btn">
        <span x-text="tab.label"></span>
      </button>
    </template>
  </div>

  <!-- ═══ CONTENT ═══════════════════════════════════════ -->
  <div class="content-wrapper">

    <!-- ── 价格查询面板 ─────────────────────────────── -->
    <div class="tab-panel"
         :class="activeTab === 'query' ? 'panel-visible' : 'panel-hidden'">

      <!-- 列显示控制 + 行管理 -->
      <div class="flex items-center gap-x-3 gap-y-1 px-3 py-1.5 bg-white border-b border-slate-100
                  flex-shrink-0 overflow-x-auto flex-wrap">
        <span class="text-xs text-slate-400 flex-shrink-0">显示列:</span>
        <template x-for="col in infoColNames" :key="col">
          <label class="flex items-center gap-0.5 cursor-pointer flex-shrink-0 select-none">
            <input type="checkbox"
                   :checked="colVisibility[col]"
                   @change="toggleCol(col, $event.target.checked)"
                   class="h-3 w-3 accent-blue-500"/>
            <span class="text-xs text-slate-600 whitespace-nowrap" x-text="col"></span>
          </label>
        </template>
        <div class="flex-1"></div>
        <button @click="addBlankRow()"       class="btn-ghost text-xs py-0.5">＋ 行</button>
        <button @click="removeSelectedRow()" class="btn-ghost text-xs py-0.5">－ 行</button>
      </div>

      <div id="queryGrid"></div>
    </div>

    <!-- ── 价目表面板 ──────────────────────────────── -->
    <div class="tab-panel"
         :class="activeTab === 'pricelist' ? 'panel-visible' : 'panel-hidden'">

      <!-- 价目表工具栏 -->
      <div class="flex items-center gap-2 px-3 py-2 bg-white border-b border-slate-100 flex-shrink-0">

        <!-- 搜索框 -->
        <input type="text" x-model="priceSearch"
               @keydown.enter="onPriceSearch()"
               placeholder="关键词搜索（空格或逗号分隔）…"
               class="input-base flex-1 text-xs py-1"/>
        <button @click="onPriceSearch()"   class="btn-blue">搜索</button>
        <button @click="clearPriceSearch()" class="btn-ghost text-xs">✕</button>

        <div class="w-px h-5 bg-slate-200"></div>

        <!-- 关键词选择器（下拉） -->
        <div class="relative" x-show="plKeywords.length > 0">
          <button @click="plKwOpen = !plKwOpen"
                  class="btn-slate flex items-center gap-1 whitespace-nowrap">
            <span>关键词</span>
            <span x-show="plKwSel.length > 0"
                  class="inline-flex items-center justify-center w-4 h-4 rounded-full
                         bg-blue-500 text-white text-[10px] font-bold"
                  x-text="plKwSel.length"></span>
            <svg class="w-3 h-3 ml-0.5 transition-transform duration-200"
                 :class="{ 'rotate-180': plKwOpen }"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

          <!-- 下拉面板 -->
          <div x-show="plKwOpen"
               x-transition
               @click.outside="plKwOpen = false"
               class="kw-dropdown"
               style="display:none">

            <!-- 清除按钮 -->
            <div class="flex items-center justify-between mb-2">
              <span class="text-xs font-semibold text-slate-500">选择关键词筛选</span>
              <button @click="clearPlKw()"
                      class="text-xs text-red-400 hover:text-red-600 px-2 py-0.5
                             border border-red-200 rounded-md hover:bg-red-50 transition-colors">
                清除全部
              </button>
            </div>

            <!-- 关键词网格（4列）-->
            <div class="grid grid-cols-4 gap-1.5">
              <template x-for="kw in plKeywords" :key="kw">
                <span @click="togglePlKw(kw)"
                      :class="{ 'active': isKwSelected(kw) }"
                      class="kw-chip justify-center text-center"
                      x-text="kw"></span>
              </template>
            </div>

            <!-- 已选提示 -->
            <div x-show="plKwSel.length > 0"
                 class="mt-2 pt-2 border-t border-slate-100 text-xs text-slate-400">
              已选 <span class="text-blue-500 font-medium" x-text="plKwSel.length"></span> 个
              · <span x-text="plKwSel.join(' + ')"></span>
            </div>
          </div>
        </div>

        <!-- 搜索统计 -->
        <span class="text-xs text-slate-400 ml-1 min-w-28 whitespace-nowrap" x-text="priceStats"></span>
      </div>

      <div id="priceListGrid"></div>
    </div>

  </div><!-- /content-wrapper -->


  <!-- ═══ EDIT MODAL ════════════════════════════════════ -->
  <div x-show="editDlg.open"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0 backdrop-blur-none"
       x-transition:enter-end="opacity-100 backdrop-blur-sm"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100 backdrop-blur-sm"
       x-transition:leave-end="opacity-0 backdrop-blur-none"
       @keydown.escape.window="editDlg.open = false"
       class="fixed inset-0 bg-slate-900/40 flex items-center justify-center z-50"
       style="display:none">

    <div x-show="editDlg.open"
         x-transition:enter="transition ease-out duration-300 delay-75"
         x-transition:enter-start="opacity-0 translate-y-8 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0 scale-100"
         x-transition:leave-end="opacity-0 translate-y-4 scale-95"
         class="bg-white rounded-xl shadow-2xl w-[500px] p-6 border border-slate-100"
         @click.stop>
      <h3 class="text-sm font-semibold text-slate-700 mb-4">编辑商品信息</h3>
      <div class="space-y-3">
        <div class="flex items-center gap-3">
          <label class="text-xs text-slate-500 w-20 text-right">Item NO.</label>
          <input type="text" x-model="editDlg.item_no" class="input-base flex-1 text-xs"/>
        </div>
        <div class="flex items-center gap-3">
          <label class="text-xs text-slate-500 w-20 text-right">商品代码</label>
          <input type="text" x-model="editDlg.code" class="input-base flex-1 text-xs"/>
        </div>
        <div class="flex items-start gap-3">
          <label class="text-xs text-slate-500 w-20 text-right mt-1.5">客户描述</label>
          <textarea x-model="editDlg.desc" rows="3"
                    class="input-base flex-1 text-xs resize-none"></textarea>
        </div>
        <div class="flex items-center gap-3">
          <label class="text-xs text-slate-500 w-20 text-right">数量</label>
          <input type="text" x-model="editDlg.qty"  class="input-base w-24 text-xs"/>
          <label class="text-xs text-slate-500 ml-3">UOM</label>
          <input type="text" x-model="editDlg.unit" class="input-base w-20 text-xs"/>
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button @click="editDlg.open = false"  class="btn-ghost text-xs">取消</button>
        <button @click="saveEdit()"             class="btn-slate text-xs">保存</button>
        <button @click="matchEdit()"            class="btn-blue  text-xs">Match 重新查询</button>
      </div>
    </div>
  </div>

  <!-- ═══ EXPORT MODAL ══════════════════════════════════ -->
  <div x-show="exportDlg.open"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0 backdrop-blur-none"
       x-transition:enter-end="opacity-100 backdrop-blur-sm"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100 backdrop-blur-sm"
       x-transition:leave-end="opacity-0 backdrop-blur-none"
       @keydown.escape.window="exportDlg.open = false"
       class="fixed inset-0 bg-slate-900/40 flex items-center justify-center z-50"
       style="display:none">

    <div x-show="exportDlg.open"
         x-transition:enter="transition ease-out duration-300 delay-75"
         x-transition:enter-start="opacity-0 translate-y-8 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0 scale-100"
         x-transition:leave-end="opacity-0 translate-y-4 scale-95"
         class="bg-white rounded-xl shadow-2xl w-80 p-6 border border-slate-100"
         @click.stop>
      <h3 class="text-sm font-semibold text-slate-700 mb-5 text-center">选择导出方式</h3>
      <div class="flex flex-col gap-3">
        <button @click="doExport('html')"
                class="w-full py-3 rounded-lg bg-blue-500 text-white text-sm font-medium
                       hover:bg-blue-600 transition-colors">
          复制 HTML 表格<br>
          <span class="text-xs font-normal opacity-80">直接粘贴到 Outlook 邮件</span>
        </button>
        <button @click="doExport('eml')"
                class="w-full py-3 rounded-lg bg-green-500 text-white text-sm font-medium
                       hover:bg-green-600 transition-colors">
          保存 .eml 文件<br>
          <span class="text-xs font-normal opacity-80">双击可用邮件客户端打开</span>
        </button>
        <button @click="doExport('text')"
                class="w-full py-2 rounded-lg border border-slate-200 text-slate-600
                       text-sm hover:bg-slate-50 transition-colors">
          复制纯文本
        </button>
      </div>
      <button @click="exportDlg.open = false"
              class="w-full mt-3 text-xs text-slate-400 hover:text-slate-600">取消</button>
    </div>
  </div>

  <script src="js/grid.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
