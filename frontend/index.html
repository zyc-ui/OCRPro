<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seastar</title>
  <link rel="icon" href="../images/app_icon.ico" sizes="any"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="style.css"/>
  <style type="text/tailwindcss">
    @layer components {
      .btn-blue  { @apply px-3 py-1.5 text-xs font-semibold bg-blue-500 text-white rounded-md hover:bg-blue-600 disabled:opacity-40 disabled:cursor-not-allowed transition-colors; }
      .btn-slate { @apply px-3 py-1.5 text-xs font-medium border border-slate-200 text-slate-600 rounded-md hover:bg-slate-50 disabled:opacity-40 transition-colors; }
      .btn-ghost { @apply px-3 py-1.5 text-xs text-slate-500 hover:bg-slate-100 rounded-md transition-colors; }
      .input-base { @apply text-sm border border-slate-200 rounded-md px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white; }
    }
  </style>
  <style>
    /* ══ 全局布局 ══════════════════════════════════════════ */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body { display: flex; flex-direction: column; background: #f8fafc; }

    .content-wrapper {
      flex: 1; position: relative; overflow: hidden; min-height: 0;
    }
    .tab-panel {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      overflow: hidden; background: #f8fafc;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    .tab-panel.panel-hidden  { opacity: 0; pointer-events: none; transform: translateY(6px); }
    .tab-panel.panel-visible { opacity: 1; pointer-events: auto;  transform: translateY(0); }

    /* ══ 表格容器 ══════════════════════════════════════════ */
    #queryGrid, #priceListGrid {
      flex: 1 1 0; min-height: 0; width: 100%;
      overflow: auto; border: 1px solid #e2e8f0; border-radius: 0 0 6px 6px;
    }

    /* ══ 表格核心 ══════════════════════════════════════════ */
    .sg-table { table-layout: fixed; border-collapse: collapse; font-size: 12px; font-family: -apple-system, 'Helvetica Neue', sans-serif; }

    .sg-thead { position: sticky; top: 0; z-index: 10; }
    .sg-th {
      padding: 7px 10px 7px 8px; text-align: left; font-size: 11px; font-weight: 600;
      white-space: nowrap; overflow: hidden;
      border-right: 1px solid #334155; border-bottom: 2px solid #1e293b;
      background: #1e293b; color: #f1f5f9; user-select: none; box-sizing: border-box;
      cursor: grab;
    }
    .sg-th:active { cursor: grabbing; }
    .sg-th-text { display: block; overflow: hidden; text-overflow: ellipsis; }
    .sg-th.col-fixed-hdr    { background: #1d4ed8; color: #eff6ff; border-right-color: #1e40af; }
    .sg-th.col-price-hdr    { background: #1e40af; border-right-color: #1e3a8a; }
    .sg-th.col-company-hdr  { background: #0369a1; border-right-color: #075985; }

    /* 列拖拽：源列淡出，兄弟列平滑位移 */
    .sg-th { transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1); }
    .sg-th-drag-source { opacity: 0.15 !important; }

    /* resize handle */
    .sg-resize-handle {
      position: absolute; right: 0; top: 0; width: 5px; height: 100%;
      cursor: col-resize; background: transparent; z-index: 2;
    }
    .sg-resize-handle:hover { background: rgba(255,255,255,0.28); }

    /* ══ 数据单元格 ══════════════════════════════════════════ */
    .sg-td {
      padding: 4px 8px; font-size: 12px;
      border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0;
      vertical-align: top; color: #1e293b; box-sizing: border-box;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }
    /* 前5列（客户信息）→ 淡蓝色 */
    .sg-td.col-fixed-5  { background: #eff6ff; }
    /* 价格列 → 浅蓝（略深，便于区分）*/
    .sg-td.col-price    { background: #dbeafe; }
    /* 公司列 → 浅蓝 */
    .sg-td.col-company  { background: #e0f2fe; }
    /* 代码列等宽字体 */
    .sg-td.col-code     { font-family: 'Consolas','SF Mono',monospace; font-size: 11px; color: #475569; }
    .sg-td.col-wrap     { white-space: pre-wrap; word-break: break-word; text-overflow: clip; }

    /* ══ 行状态 ══════════════════════════════════════════════ */
    .sg-spacer { background: transparent; border: none; }
    .sg-row    { cursor: pointer; }
    /* 偶数行：乳白 / 奇数行：暖米白，其他特殊列叠加色 */
    .sg-row-even .sg-td              { background-color: #fefdf9; }
    .sg-row-even .sg-td.col-fixed-5  { background: #eff6ff; }
    .sg-row-even .sg-td.col-price    { background: #dbeafe; }
    .sg-row-even .sg-td.col-company  { background: #e0f2fe; }
    .sg-row-odd .sg-td               { background-color: #faf9f5; }
    .sg-row-odd .sg-td.col-fixed-5   { background: #e8f1ff; }
    .sg-row-odd .sg-td.col-price     { background: #d4e8fe; }
    .sg-row-odd .sg-td.col-company   { background: #d9edf8; }
    .sg-row:hover .sg-td         { background: #f0f4ff !important; color: #1e293b !important; }
    .sg-row.row-selected .sg-td  { background: #bfdbfe !important; color: #1e293b !important; }
    .sg-row.row-not-found .sg-td { color: #ef4444 !important; background: #fff5f5 !important; }
    .sg-row.row-matched .sg-td   { background: #fef9c3 !important; }

    /* ══ 行高滑块 ══════════════════════════════════════════ */
    input[type=range].rh-slider {
      -webkit-appearance: none; width: 80px; height: 4px;
      border-radius: 2px; background: #cbd5e1; outline: none; cursor: pointer;
    }
    input[type=range].rh-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: #3b82f6; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }

    /* ══ 关键词下拉 ══════════════════════════════════════════ */
    .kw-dropdown {
      position: absolute; top: calc(100% + 4px); right: 0; z-index: 50;
      background: white; border: 1px solid #e2e8f0; border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12); padding: 10px;
      min-width: 320px; max-width: 480px;
    }
    .kw-chip {
      display: inline-flex; align-items: center; padding: 3px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 500; cursor: pointer;
      border: 1px solid #e2e8f0; background: #f8fafc; color: #475569;
      transition: background .15s, color .15s, border-color .15s; user-select: none;
    }
    .kw-chip:hover  { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
    .kw-chip.active { background: #3b82f6; border-color: #3b82f6; color: white; }

    /* ══ Modal 弹入动画 ══════════════════════════════════════ */
    @keyframes modal-in {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    /* .modal-overlay = always in DOM; toggled via .modal-overlay--open */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      background: rgba(15, 23, 42, 0);
      backdrop-filter: blur(0px) saturate(100%);
      -webkit-backdrop-filter: blur(0px) saturate(100%);
      /* Close: backdrop fades last (delay 0.12s) */
      transition: opacity 0.2s ease 0.12s, background 0.2s ease 0.12s,
                  backdrop-filter 0.2s ease 0.12s;
    }
    .modal-overlay--open {
      opacity: 1; pointer-events: auto;
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(7px) saturate(160%);
      -webkit-backdrop-filter: blur(7px) saturate(160%);
      /* Open: backdrop fades in immediately */
      transition: opacity 0.25s ease 0s, background 0.25s ease 0s,
                  backdrop-filter 0.25s ease 0s;
    }
    /* Card: close immediately (no delay) */
    .modal-card {
      opacity: 0; transform: translateY(28px) scale(0.92);
      transition: opacity 0.16s ease 0s, transform 0.16s ease 0s;
    }
    /* Card: open with spring easing after backdrop (70ms delay) */
    .modal-overlay--open .modal-card {
      opacity: 1; transform: translateY(0) scale(1);
      transition: opacity 0.3s cubic-bezier(0.34, 1.4, 0.64, 1) 0.07s,
                  transform 0.3s cubic-bezier(0.34, 1.4, 0.64, 1) 0.07s;
    }

    /* ══ Tab 动效 ════════════════════════════════════════════ */
    .tab-btn {
      position: relative; padding: 8px 16px; font-size: 12px; color: #64748b;
      border-bottom: 2px solid transparent; cursor: pointer; transition: color .2s;
      background: none; border-top: none; border-left: none; border-right: none; outline: none;
    }
    .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; }
    .tab-btn:hover:not(.active) { color: #334155; }

    /* ══ Toast ════════════════════════════════════════════════ */
    .toast-box {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      background: #1e293b; color: #f1f5f9;
      padding: 12px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
      animation: modal-in 0.22s ease both;
    }

  </style>
</head>

<body x-data="App()" x-init="init()" @ocr-result.window="_handleOCRResult($event.detail)">

  <!-- ═══ TOP BAR ═══════════════════════════════════════ -->
  <div class="flex items-center gap-2 px-3 py-2 bg-white border-b border-slate-200 flex-shrink-0 h-12 shadow-sm">
    <span class="text-sm font-bold text-slate-800 tracking-widest select-none mr-1">Seastar</span>
    <div class="w-px h-5 bg-slate-200 mx-1"></div>

    <label class="text-xs text-slate-400 font-medium whitespace-nowrap" x-text="t('company_label')"></label>
    <select x-model="company" @change="onCompanyChange()"
            class="text-xs border border-slate-200 rounded-md px-2 py-1 bg-white text-slate-700
                   focus:outline-none focus:ring-2 focus:ring-blue-400 w-36">
      <option value="">-- Select --</option>
      <template x-for="opt in companyOptions" :key="opt">
        <option :value="opt" x-text="opt"></option>
      </template>
    </select>

    <div class="w-px h-5 bg-slate-200 mx-1"></div>

    <button @click="startOCR(false)" :disabled="isScanning" class="btn-blue">
      <span x-show="!isScanning" x-text="t('ocr_btn')"></span>
      <span x-show="isScanning" class="flex items-center gap-1">
        <svg class="animate-spin h-3 w-3" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.25"/>
          <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span x-text="t('scanning')"></span>
      </span>
    </button>

    <button @click="startOCR(true)" :disabled="isScanning" class="btn-slate" x-text="t('append_ocr')"></button>

    <button @click="queryPrices()" :disabled="isQuerying || !productItems.length" class="btn-blue">
      <span x-show="!isQuerying" x-text="t('query_price')"></span>
      <span x-show="isQuerying"  x-text="t('querying')"></span>
    </button>

    <button @click="openExportDialog()" :disabled="!queryResults.length" class="btn-slate" x-text="t('copy_table')"></button>
    <button @click="clearAll()" class="btn-ghost text-red-400 hover:text-red-500 hover:bg-red-50" x-text="t('clear')"></button>

    <!-- 行高滑块 -->
    <div class="flex items-center gap-1.5 ml-3 pl-3 border-l border-slate-200">
      <span class="text-xs text-slate-400 whitespace-nowrap" x-text="t('row_height')"></span>
      <input type="range" class="rh-slider" min="28" max="200" step="4"
             :value="rowHeight" @input="onRowHeightChange($event.target.value)"/>
      <span class="text-xs text-slate-500 font-mono w-8" x-text="rowHeight + 'px'"></span>
    </div>

    <div class="flex-1"></div>

    <button @click="openDBUpdate()" class="btn-ghost text-slate-400 text-xs" x-text="t('fulllist_btn')"></button>
    <button @click="toggleLang()"
            class="text-xs font-semibold px-2 py-1 rounded border border-blue-300
                   text-blue-500 hover:bg-blue-50 ml-1"
            x-text="t('lang_toggle')"></button>
  </div>

  <!-- ═══ INFO BAR ══════════════════════════════════════ -->
  <div class="flex items-center px-3 py-1 bg-blue-50 border-b border-blue-100 flex-shrink-0 min-h-7">
    <span class="text-xs font-semibold text-blue-400 mr-2 flex-shrink-0" x-text="t('item_code_label')"></span>
    <span class="text-xs text-slate-600 truncate flex-1" x-text="codesText"></span>
    <span x-show="company" class="text-xs text-blue-500 font-medium ml-4 flex-shrink-0"
          x-text="t('price_col_prefix') + (companyColLabel || 'High / Medium Price')"></span>
  </div>

  <!-- ═══ TAB BAR ══════════════════════════════════════ -->
  <div class="flex items-end px-3 bg-white border-b border-slate-200 flex-shrink-0">
    <template x-for="tab in tabs" :key="tab.id">
      <button @click="switchTab(tab.id)"
              :class="{ 'active': activeTab === tab.id }"
              class="tab-btn">
        <span x-text="tab.label"></span>
      </button>
    </template>
  </div>

  <!-- ═══ CONTENT ═══════════════════════════════════════ -->
  <div class="content-wrapper">

    <!-- ── 价格查询面板 ─────────────────────────────── -->
    <div class="tab-panel" :class="activeTab === 'query' ? 'panel-visible' : 'panel-hidden'">

      <div class="flex items-center gap-x-3 gap-y-1 px-3 py-1.5 bg-white border-b border-slate-100
                  flex-shrink-0 overflow-x-auto flex-wrap">
        <span class="text-xs text-slate-400 flex-shrink-0" x-text="t('show_cols')"></span>
        <template x-for="col in infoColNames" :key="col">
          <label class="flex items-center gap-0.5 cursor-pointer flex-shrink-0 select-none">
            <input type="checkbox"
                   :checked="colVisibility[col]"
                   @change="toggleCol(col, $event.target.checked)"
                   class="h-3 w-3 accent-blue-500"/>
            <span class="text-xs text-slate-600 whitespace-nowrap" x-text="col"></span>
          </label>
        </template>
        <div class="flex-1"></div>
        <button @click="addBlankRow()"       class="btn-ghost text-xs py-0.5" x-text="t('add_row')"></button>
        <button @click="removeSelectedRow()" class="btn-ghost text-xs py-0.5" x-text="t('del_row')"></button>
      </div>

      <div id="queryGrid"></div>
    </div>

    <!-- ── 价目表面板 ──────────────────────────────── -->
    <div class="tab-panel" :class="activeTab === 'pricelist' ? 'panel-visible' : 'panel-hidden'">

      <div class="flex items-center gap-2 px-3 py-2 bg-white border-b border-slate-100 flex-shrink-0">
        <input type="text" x-model="priceSearch"
               @keydown.enter="onPriceSearch()"
               :placeholder="t('search_ph')"
               class="input-base flex-1 text-xs py-1"/>
        <button @click="onPriceSearch()"    class="btn-blue"       x-text="t('search_btn')"></button>
        <button @click="clearPriceSearch()" class="btn-ghost text-xs" x-text="t('clear_x')"></button>

        <div class="w-px h-5 bg-slate-200"></div>

        <!-- 关键词选择器 -->
        <div class="relative" x-show="plKeywords.length > 0">
          <button @click="plKwOpen = !plKwOpen"
                  class="btn-slate flex items-center gap-1 whitespace-nowrap">
            <span x-text="t('keywords_btn')"></span>
            <span x-show="plKwSel.length > 0"
                  class="inline-flex items-center justify-center w-4 h-4 rounded-full
                         bg-blue-500 text-white text-[10px] font-bold"
                  x-text="plKwSel.length"></span>
            <svg class="w-3 h-3 ml-0.5 transition-transform duration-200"
                 :class="{ 'rotate-180': plKwOpen }"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

          <div x-show="plKwOpen"
               x-transition
               @click.outside="plKwOpen = false"
               class="kw-dropdown"
               style="display:none">

            <div class="flex items-center justify-between mb-2">
              <span class="text-xs font-semibold text-slate-500" x-text="t('kw_filter_title')"></span>
              <button @click="clearPlKw()"
                      class="text-xs text-red-400 hover:text-red-600 px-2 py-0.5
                             border border-red-200 rounded-md hover:bg-red-50 transition-colors"
                      x-text="t('clear_all')"></button>
            </div>

            <div class="grid grid-cols-4 gap-1.5">
              <template x-for="kw in plKeywords" :key="kw">
                <span @click="togglePlKw(kw)"
                      :class="{ 'active': isKwSelected(kw) }"
                      class="kw-chip justify-center text-center"
                      x-text="kw"></span>
              </template>
            </div>

            <div x-show="plKwSel.length > 0"
                 class="mt-2 pt-2 border-t border-slate-100 text-xs text-slate-400">
              <span x-text="t('kw_selected')"></span>
              <span class="text-blue-500 font-medium mx-1" x-text="plKwSel.length"></span>
              <span x-text="t('kw_sep')"></span>
              · <span x-text="plKwSel.join(' + ')"></span>
            </div>
          </div>
        </div>

        <span class="text-xs text-slate-400 ml-1 min-w-28 whitespace-nowrap" x-text="priceStats"></span>
      </div>

      <div id="priceListGrid"></div>
    </div>

  </div><!-- /content-wrapper -->


  <!-- ═══ EDIT MODAL ════════════════════════════════════ -->
  <div :class="editDlg.open ? 'modal-overlay modal-overlay--open' : 'modal-overlay'"
       @keydown.escape.window="editDlg.open = false"
       @click.self="editDlg.open = false">
    <div class="modal-card bg-white rounded-xl shadow-2xl w-[500px] p-6 border border-slate-100"
         @click.stop>
      <h3 class="text-sm font-semibold text-slate-700 mb-4" x-text="t('edit_title')"></h3>
      <div class="space-y-3">
        <div class="flex items-center gap-3">
          <label class="text-xs text-slate-500 w-24 text-right" x-text="t('lbl_item_no')"></label>
          <input type="text" x-model="editDlg.item_no" class="input-base flex-1 text-xs"/>
        </div>
        <div class="flex items-center gap-3">
          <label class="text-xs text-slate-500 w-24 text-right" x-text="t('lbl_code')"></label>
          <input type="text" x-model="editDlg.code" class="input-base flex-1 text-xs"/>
        </div>
        <div class="flex items-start gap-3">
          <label class="text-xs text-slate-500 w-24 text-right mt-1.5" x-text="t('lbl_desc')"></label>
          <textarea x-model="editDlg.desc" rows="3"
                    class="input-base flex-1 text-xs resize-none"></textarea>
        </div>
        <div class="flex items-center gap-3">
          <label class="text-xs text-slate-500 w-24 text-right" x-text="t('lbl_qty')"></label>
          <input type="text" x-model="editDlg.qty"  class="input-base w-24 text-xs"/>
          <label class="text-xs text-slate-500 ml-2" x-text="t('lbl_uom')"></label>
          <input type="text" x-model="editDlg.unit" class="input-base w-20 text-xs"/>
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button @click="editDlg.open = false" class="btn-ghost text-xs" x-text="t('cancel')"></button>
        <button @click="saveEdit()"            class="btn-slate text-xs" x-text="t('save')"></button>
        <button @click="matchEdit()"           class="btn-blue  text-xs" x-text="t('match_btn')"></button>
      </div>
    </div>
  </div>

  <!-- ═══ EXPORT MODAL ══════════════════════════════════ -->
  <div :class="exportDlg.open ? 'modal-overlay modal-overlay--open' : 'modal-overlay'"
       @keydown.escape.window="exportDlg.open = false"
       @click.self="exportDlg.open = false">
    <div class="modal-card bg-white rounded-xl shadow-2xl w-80 p-6 border border-slate-100"
         @click.stop>
      <h3 class="text-sm font-semibold text-slate-700 mb-5 text-center" x-text="t('export_title')"></h3>
      <div class="flex flex-col gap-3">
        <button @click="doExport('html')"
                class="w-full py-3 rounded-lg bg-blue-500 text-white text-sm font-medium hover:bg-blue-600 transition-colors">
          <span x-text="t('copy_html_btn')"></span><br>
          <span class="text-xs font-normal opacity-80" x-text="t('copy_html_sub')"></span>
        </button>
        <button @click="doExport('eml')"
                class="w-full py-3 rounded-lg bg-green-500 text-white text-sm font-medium hover:bg-green-600 transition-colors">
          <span x-text="t('save_eml_btn')"></span><br>
          <span class="text-xs font-normal opacity-80" x-text="t('save_eml_sub')"></span>
        </button>
        <button @click="doExport('text')"
                class="w-full py-2 rounded-lg border border-slate-200 text-slate-600 text-sm hover:bg-slate-50 transition-colors"
                x-text="t('copy_text_btn')"></button>
      </div>
      <button @click="exportDlg.open = false"
              class="w-full mt-3 text-xs text-slate-400 hover:text-slate-600"
              x-text="t('cancel')"></button>
    </div>
  </div>

  <!-- ═══ TOAST ═════════════════════════════════════════ -->
  <div x-show="toast.show"
       x-transition
       class="toast-box"
       x-text="toast.msg"
       style="display:none">
  </div>

  <script src="js/grid.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
